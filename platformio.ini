; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common configuration for both boards
[env]
platform = espressif32@6.12.0
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
upload_protocol = esptool
upload_speed = 460800
monitor_rts = 0
monitor_dtr = 0
build_flags = 
  -Os
  -DCORE_DEBUG_LEVEL=0
  -DWEIGHMYBRU_BUILD_NUMBER=1
  -DWEIGHMYBRU_COMMIT_HASH=\"dev\"
  -DCONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_80=1
  -DCONFIG_ESP_DEFAULT_CPU_FREQ_MHZ=80
lib_deps = 
	robtillaart/HX711@^0.6.0
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
	h2zero/NimBLE-Arduino@^1.4.0
	adafruit/Adafruit SSD1306@^2.5.7
	adafruit/Adafruit GFX Library@^1.11.9

; ESP32-S3-DevKitC-1 (SuperMini) Environment
[env:esp32s3-supermini]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
upload_flags = 
  --chip=esp32s3
  --before=default_reset
  --after=hard_reset
build_flags = 
  ${env.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DBOARD_SUPERMINI
; Use explicit lib_deps for ESP32-S3 to avoid RP2040/RPAsyncTCP selection
lib_deps =
    me-no-dev/AsyncTCP@^1.1.1
    me-no-dev/ESPAsyncWebServer@^1.2.3
    h2zero/NimBLE-Arduino@^1.4.0
    robtillaart/HX711@^0.6.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9

; XIAO ESP32S3 Environment  
[env:esp32s3-xiao]
board = seeed_xiao_esp32s3
board_upload.flash_size = 8MB
upload_flags = 
  --chip=esp32s3
  --before=default_reset
  --after=hard_reset
build_flags = 
  ${env.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DBOARD_XIAO
; Use explicit lib_deps for ESP32-S3 XIAO to avoid RP2040/RPAsyncTCP selection
lib_deps =
    me-no-dev/AsyncTCP@^1.1.1
    me-no-dev/ESPAsyncWebServer@^1.2.3
    h2zero/NimBLE-Arduino@^1.4.0
    robtillaart/HX711@^0.6.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9

; NodeMCU ESP32 WROOM-32 Environment
[env:nodemcu-esp32-wroom32]
board = nodemcu-32s
board_upload.flash_size = 4MB
upload_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
monitor_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
upload_flags = 
  --chip=esp32
  --before=default_reset
  --after=hard_reset
build_flags = 
  ${env.build_flags}
  -DBOARD_NODEMCU_ESP32